<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskflow — To‑Do List</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header text-center">
      <div class="header-eyebrow">Your personal workspace</div>
      <h1 class="app-title">Taskflow</h1>
      <p class="app-subtitle">Clarity in every task.</p>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-pill">
        <span class="stat-num" id="numTotal">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-pill stat-inprogress">
        <span class="stat-num" id="numInProgress">0</span>
        <span class="stat-label">In Progress</span>
      </div>
      <div class="stat-pill stat-done">
        <span class="stat-num" id="numDone">0</span>
        <span class="stat-label">Done</span>
      </div>
    </div>

    <!-- Add Task Form -->
    <div class="add-task-card">
      <div class="input-row">
        <i class="bi bi-plus-lg input-icon"></i>
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="What needs to be done?"
          autocomplete="off"
          maxlength="120"
        />
        <button class="add-btn" id="addTaskBtn" aria-label="Add task">
          <span>Add</span>
          <i class="bi bi-arrow-right-short"></i>
        </button>
      </div>
      <div class="form-meta">
        <div class="error-msg" id="errorMsg" role="alert" aria-live="polite"></div>
        <div class="char-counter"><span id="charCount">0</span>/120</div>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs" role="tablist" aria-label="Filter tasks">
      <button class="filter-tab active" data-filter="all" role="tab">All</button>
      <button class="filter-tab" data-filter="pending" role="tab">Pending</button>
      <button class="filter-tab" data-filter="inprogress" role="tab">In Progress</button>
      <button class="filter-tab" data-filter="done" role="tab">Done</button>
    </div>

    <!-- Task List -->
    <div class="task-list-container">
      <ul class="task-list" id="taskList" aria-label="Task list"></ul>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon"><i class="bi bi-journal-check"></i></div>
        <p class="empty-title">All clear!</p>
        <p class="empty-sub">Add a task above to get started.</p>
      </div>
    </div>

    <!-- Footer actions -->
    <div class="footer-actions" id="footerActions" style="display:none">
      <button class="clear-btn" id="clearDoneBtn">
        <i class="bi bi-trash3"></i> Clear completed
      </button>
    </div>

  </div><!-- /app-wrapper -->

  <!-- Toast notification -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="liveToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastBody">Task added!</div>
        <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
