<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Step Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <input type="radio" name="step" id="s1" class="step-radio" checked />
  <input type="radio" name="step" id="s2" class="step-radio" />
  <input type="radio" name="step" id="s3" class="step-radio" />

  <div class="page-wrapper">
    <div class="form-card">

      <h1 class="card-heading">Create Account</h1>

      <nav class="step-bar">
        <div class="step-item">
          <label for="s1" class="step-circle">1</label>
          <span class="step-label">Personal</span>
        </div>
        <div class="step-connector"></div>
        <div class="step-item">
          <label for="s2" class="step-circle">2</label>
          <span class="step-label">Account</span>
        </div>
        <div class="step-connector"></div>
        <div class="step-item">
          <label for="s3" class="step-circle">3</label>
          <span class="step-label">Confirm</span>
        </div>
      </nav>

      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>

      <form class="form-body">

        <fieldset class="panel" id="p1">
          <legend class="panel-legend">Personal Information</legend>

          <div class="field">
            <label for="fname">Full Name</label>
            <input type="text" id="fname" name="fname" required />
          </div>

          <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="field">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" />
          </div>

          <div class="panel-nav">
            <span></span>
            <label for="s2" class="btn btn-primary">Next &rarr;</label>
          </div>
        </fieldset>

        <fieldset class="panel" id="p2">
          <legend class="panel-legend">Account Setup</legend>

          <div class="field">
            <label for="uname">Username</label>
            <input type="text" id="uname" name="uname" required />
          </div>

          <div class="field">
            <label for="pwd">Password</label>
            <input type="password" id="pwd" name="pwd" required />
          </div>

          <div class="field">
            <label for="role">Your Role</label>
            <select id="role" name="role" required>
              <option value="" disabled selected>Select a role...</option>
              <option value="student">Student</option>
              <option value="developer">Developer</option>
              <option value="designer">Designer</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="panel-nav">
            <label for="s1" class="btn btn-ghost">&larr; Back</label>
            <label for="s3" class="btn btn-primary">Next &rarr;</label>
          </div>
        </fieldset>

        <fieldset class="panel" id="p3">
          <legend class="panel-legend">Almost Done!</legend>

          <div class="review-box">
            <p class="review-hint">Review your info before submitting.</p>
            <ul class="review-list">
              <li><span class="review-key">Full Name</span> <span class="review-val">–</span></li>
              <li><span class="review-key">Email</span> <span class="review-val">–</span></li>
              <li><span class="review-key">Username</span> <span class="review-val">–</span></li>
            </ul>
          </div>

          <div class="field field--checkbox">
            <input type="checkbox" id="agree" name="agree" required />
            <label for="agree" class="checkbox-label">
              I agree to the <a href="#">Terms &amp; Conditions</a>
            </label>
          </div>

          <div class="panel-nav">
            <label for="s2" class="btn btn-ghost">&larr; Back</label>
            <button type="submit" class="btn btn-primary">Submit ✓</button>
          </div>
        </fieldset>

      </form>

    </div>
  </div>

</body>
</html>
