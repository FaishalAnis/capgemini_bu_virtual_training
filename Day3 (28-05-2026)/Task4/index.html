<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure CSS Animated Hero</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero-section">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <div class="overlay"></div>

    <div class="hero-content">
      <div class="badge fade-in-up" style="--delay: 0.2s">
        <span class="badge-dot"></span> v2.0 is now live
      </div>
      
      <h1 class="hero-title fade-in-up" style="--delay: 0.4s">
        Design seamlessly.<br>
        Ship <span class="gradient-text">faster</span>.
      </h1>
      
      <p class="hero-subtitle fade-in-up" style="--delay: 0.6s">
        The ultimate CSS-only framework for modern developers. Build stunning, responsive, and blazing-fast web experiences without writing a single line of JavaScript.
      </p>
      
      <div class="cta-group fade-in-up" style="--delay: 0.8s">
        <a href="#" class="btn btn-primary">Start Building Free</a>
        <a href="#" class="btn btn-secondary">Read Documentation</a>
      </div>
    </div>
  </header>

</body>
</html>
