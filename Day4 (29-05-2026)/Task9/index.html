<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Theme Switcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <input type="checkbox" id="theme-switch" hidden>

  <div class="theme-wrapper">
    <div class="card">
      <h2>CSS Theme Switcher</h2>
      <p>Click the button below to switch between light and dark mode instantly.</p>
      
      <label for="theme-switch" class="toggle-btn">Toggle Dark Mode</label>
    </div>
  </div>

</body>
</html>
