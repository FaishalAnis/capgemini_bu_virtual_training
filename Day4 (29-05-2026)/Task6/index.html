<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>CSS-Only Modal</h1>
    <a href="#demo-modal" class="btn">Open Modal</a>
  </div>

  <div id="demo-modal" class="modal-overlay">
    <div class="modal-content">
      <a href="#" class="close-btn">&times;</a>
      <h2>Success!</h2>
      <p>This modal is powered entirely by CSS. The background features a blur effect, and it seamlessly centers using Flexbox.</p>
      <a href="#" class="btn btn-block">Understood</a>
    </div>
  </div>

</body>
</html>
