<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masonry Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="gallery-container">
    <div class="masonry">
      
      <div class="item">
        <img src="https://images.unsplash.com/photo-1513360371669-4adf3dd7dff8?w=500" alt="Image">
        <div class="overlay">
          <h3>Neon City</h3>
          <a href="#">View</a>
        </div>
      </div>
      
      <div class="item">
        <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=500" alt="Image">
        <div class="overlay">
          <h3>Architecture</h3>
          <a href="#">View</a>
        </div>
      </div>

      <div class="item">
        <img src="https://images.unsplash.com/photo-1506744626753-eda818c6b2cb?w=500" alt="Image">
        <div class="overlay">
          <h3>Mountains</h3>
          <a href="#">View</a>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
